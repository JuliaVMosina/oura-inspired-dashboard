version: 2

sources:
  - name: raw
    description: "Synthetic CSV files generated by python/generate_data.py"
    tables:
      - name: users
        description: "User profiles with segment, demographics and device info"
      - name: daily_scores
        description: "Daily readiness, sleep and activity scores plus readiness factor breakdown"
      - name: sleep_sessions
        description: "Per-night sleep session: duration, stages, bedtime, score"
      - name: activity_sessions
        description: "Daily activity: steps, calories, zones, workout detection"
      - name: hrv_metrics
        description: "Daily physiological signals: HRV, resting HR, body temperature deviation"
      - name: app_engagement
        description: "Per-session app usage: features viewed, goal completion, notification interaction"
